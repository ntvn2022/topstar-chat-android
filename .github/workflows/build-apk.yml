name: Build Topstar Chat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Element Android
      uses: actions/checkout@v4
      with:
        repository: element-hq/element-android
        ref: develop

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Rebrand to Topstar Chat
      run: |
        find . -path "*/values/strings.xml" | xargs sed -i 's|<string name="app_name">Element</string>|<string name="app_name">Topstar Chat</string>|g' 2>/dev/null || true
        find . -path "*/values/strings.xml" | xargs sed -i 's|<string name="app_name">Element Classic</string>|<string name="app_name">Topstar Chat</string>|g' 2>/dev/null || true
        find . -name "config.xml" -path "*/values/*" | xargs sed -i 's|https://matrix.org|https://chat.hauto.store|g' 2>/dev/null || true
        echo "kotlin.jvm.target.validation.mode=warning" >> gradle.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build FDroid Debug APK (no Google dependency)
      run: |
        ./gradlew assembleFdroidDebug \
          --no-daemon \
          -Dkotlin.jvm.target.validation.mode=warning \
          -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=768m" \
          -Dorg.gradle.parallel=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: topstar-chat-fdroid-apk
        path: "**/*.apk"
        retention-days: 30
