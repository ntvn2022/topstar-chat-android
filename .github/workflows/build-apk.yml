name: Build Topstar Chat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Element Android
      uses: actions/checkout@v4
      with:
        repository: element-hq/element-android
        ref: develop

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Rebrand to Topstar Chat
      run: |
        # App name
        find . -path "*/values/strings.xml" | xargs sed -i 's|<string name="app_name">Element</string>|<string name="app_name">Topstar Chat</string>|g' 2>/dev/null || true
        # Default homeserver
        find . -name "*.kt" | xargs grep -l "matrix.org" 2>/dev/null | xargs sed -i 's|matrix.org|chat.hauto.store|g' 2>/dev/null || true
        find . -name "config.json" | xargs sed -i 's|matrix.org|chat.hauto.store|g' 2>/dev/null || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        ./gradlew assembleGplayDebug \
          --no-daemon \
          -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m" \
          -Dorg.gradle.parallel=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: topstar-chat-debug-apk
        path: "**/*.apk"
        retention-days: 30
